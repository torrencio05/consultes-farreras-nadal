<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director - Farreras Nadal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --teal: #2E7E82;
      --teal-light: #E0F2F1;
      --teal-dark: #1B4F52;
      --amber: #F59E0B;
      --amber-light: #FEF3C7;
      --grey-50: #F9FAFB;
      --grey-100: #F3F4F6;
      --grey-200: #E5E7EB;
      --grey-400: #9CA3AF;
      --grey-600: #4B5563;
      --grey-700: #374151;
      --red: #EF4444;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--grey-100);
      color: var(--grey-700);
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    /* HEADER */
    header {
      background: white;
      padding: 20px 25px;
      border-radius: 12px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      border-top: 4px solid var(--teal-dark);
    }

    .header-brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: -0.5px;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      color: var(--teal);
      font-weight: 600;
    }

    .counter {
      background: var(--amber-light);
      color: var(--amber);
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    /* CARD */
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 25px;
      border-top: 4px solid var(--amber);
      overflow: hidden;
    }

    .card-header {
      background: var(--amber-light);
      padding: 20px;
      border-bottom: 2px solid var(--amber);
    }

    .card-body {
      padding: 25px;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--teal-dark);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card-subtitle {
      color: var(--grey-600);
      font-size: 0.95rem;
    }

    /* DADES CONSULTA */
    .datos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }

    .datos-grid.full {
      grid-template-columns: 1fr;
    }

    .dato-item {
      background: var(--grey-50);
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid var(--teal);
    }

    .dato-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--grey-600);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .dato-valor {
      font-size: 0.95rem;
      color: var(--grey-700);
      word-break: break-word;
    }

    .dato-valor.important {
      font-weight: 600;
      color: var(--teal);
      font-size: 1.05rem;
    }

    /* ARXIU ADJUNT */
    .file-section {
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }

    .file-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #10B981;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .file-link:hover {
      background: #059669;
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    /* RESPOSTA */
    .response-section {
      background: #FEF9E7;
      border: 2px solid #F59E0B;
      border-radius: 8px;
      padding: 20px;
      margin: 25px 0;
    }

    .response-section h3 {
      color: var(--teal-dark);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 1px solid var(--grey-200);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      margin-bottom: 15px;
      background: white;
      transition: all 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(46, 126, 130, 0.1);
    }

    /* FILE INPUT */
    .file-input-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 15px;
    }

    .file-input-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--teal-light);
      color: var(--teal);
      border: 1px solid var(--teal);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .file-input-label:hover {
      background: var(--teal);
      color: white;
    }

    input[type="file"] {
      display: none;
    }

    .file-name {
      font-size: 0.85rem;
      color: var(--grey-400);
      margin-top: 8px;
    }

    /* BUTTONS */
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: var(--teal);
      color: white;
      flex: 1;
      min-width: 200px;
    }

    .btn-primary:hover {
      background: var(--teal-dark);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      background: var(--grey-400);
      cursor: not-allowed;
      transform: none;
    }

    .btn-print {
      background: var(--grey-200);
      color: var(--grey-700);
      flex: 0 1 auto;
    }

    .btn-print:hover {
      background: var(--grey-400);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--grey-400);
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 15px;
    }

    .empty-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--teal);
      margin-bottom: 10px;
    }

    .empty-text {
      color: var(--grey-600);
    }

    /* PRINT */
    @media print {
      body {
        background: white;
      }

      header, .response-section, .btn-group, .btn-print {
        display: none;
      }

      .card {
        box-shadow: none;
        border: 1px solid var(--grey-200);
        page-break-inside: avoid;
      }

      .card-header {
        background: var(--grey-100);
        border: none;
      }
    }

    @media (max-width: 640px) {
      .datos-grid {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        gap: 15px;
      }

      .btn-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header>
      <div>
        <div class="header-brand">👨‍💼 Farreras Nadal</div>
        <div class="header-title" style="margin-top: 10px;">
          <span>Consultes Pendents</span>
          <span class="counter" id="contador">0 pendents</span>
        </div>
      </div>
    </header>

    <!-- BUSCADOR -->
    <div class="card" style="border-top-color: var(--teal); margin-bottom: 20px;">
      <div class="card-body">
        <input 
          type="text" 
          id="cercador" 
          placeholder="🔍 Cerca per: Nom client, Referència, Codi, Material, ID..." 
          style="width: 100%; padding: 12px; border: 2px solid var(--grey-200); border-radius: 8px; font-size: 0.95rem;"
          onkeyup="filtrarConsultes()"
        >
      </div>
    </div>

    <!-- LLISTA DE CONSULTES -->
    <div id="llista">
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        Carregant consultes pendents...
      </div>
    </div>
  </div>

  <script>
    // ========================================================================
    // VARIABLES GLOBALS
    // ========================================================================
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbwgTS8WHhWuOuiq00yTr9RTgrqDFOQ98aD7ekr_XrQ7zfQHD18GveucC9NiCqsDaZmDnQ/exec';
    let arxiuSeleccionat = {};

    // ========================================================================
    // INICIALITZACIÓ
    // ========================================================================
    window.addEventListener('DOMContentLoaded', carregarConsultes);

    // ========================================================================
    // CARREGA DE CONSULTES PENDENTS
    // ========================================================================
    let consultesGlobals = [];
    
    async function carregarConsultes() {
      try {
        const resposta = await fetch(`${URL_SCRIPT}?correu=director`);
        const datos = await resposta.json();
        
        // VERIFICAR SI HAY ERROR
        if (datos.error) {
          console.error("❌ ERROR del Apps Script:", datos.error);
          document.getElementById('llista').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">⚠️</div>
              <div class="empty-title">Error</div>
              <div class="empty-text">Error del Apps Script: ${datos.error}</div>
            </div>
          `;
          return;
        }
        
        // VERIFICAR SI ES UN ARRAY
        if (!Array.isArray(datos)) {
          console.error("❌ La resposta NO es un array:", datos);
          document.getElementById('llista').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">⚠️</div>
              <div class="empty-title">Error</div>
              <div class="empty-text">Format de resposta incorrecte</div>
            </div>
          `;
          return;
        }
        
        // ORDENAR PER DATA
        consultesGlobals = datos.sort((a, b) => {
          const dataA = new Date(a['Data entrada']);
          const dataB = new Date(b['Data entrada']);
          return dataB - dataA;
        });
        
        document.getElementById('contador').textContent = `${consultesGlobals.length} pendent${consultesGlobals.length !== 1 ? 's' : ''}`;
        mostrarConsultes(consultesGlobals);
      } catch (e) {
        console.error('❌ Error:', e);
        document.getElementById('llista').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">Error</div>
            <div class="empty-text">No s'han pogut carregar les consultes: ${e.message}</div>
          </div>
        `;
      }
    }

    // ========================================================================
    // MOSTRAR CONSULTES (generic, per usar tant en carrega com en filtratge)
    // ========================================================================
    function mostrarConsultes(consultes) {
      if (consultes.length === 0) {
        document.getElementById('llista').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">✅</div>
            <div class="empty-title">Tot al dia!</div>
            <div class="empty-text">No hi ha consultes pendents de resposta.</div>
          </div>
        `;
        return;
      }

      let html = '';
      consultes.forEach(consulta => {
        html += generarFitxa(consulta);
      });

      document.getElementById('llista').innerHTML = html;

      // Afegir listeners als fitxers
      consultes.forEach(c => {
        const input = document.getElementById(`arxiu-${c.ID}`);
        if (input) {
          input.addEventListener('change', function() {
            const nomArxiu = this.files[0] ? this.files[0].name : '';
            document.getElementById(`fileName-${c.ID}`).textContent = nomArxiu ? '✅ ' + nomArxiu : '';
            arxiuSeleccionat[c.ID] = this.files[0];
          });
        }
      });
    }

    // ========================================================================
    // GENERAR FITXA DE CONSULTA
    // ========================================================================
    function generarFitxa(c) {
      return `
        <div class="card">
          <!-- CAPÇALERA -->
          <div class="card-header">
            <div class="card-title">
              📝 ${c['Nom client'] || 'Sense nom client'}
            </div>
            <div class="card-subtitle">
              <strong>De:</strong> ${c['Nom comercial'] || '-'} | 
              <strong>Data:</strong> ${formatarData(c['Data entrada'])}
            </div>
          </div>

          <!-- COS -->
          <div class="card-body">
            <!-- DADES PRINCIPALS -->
            <div class="datos-grid">
              <div class="dato-item">
                <div class="dato-label">Tipus</div>
                <div class="dato-valor important">${c.Tipus || '-'}</div>
              </div>
              <div class="dato-item">
                <div class="dato-label">Referència</div>
                <div class="dato-valor important">${c.Referència || '-'}</div>
              </div>
            </div>

            <!-- DADES CLIENT -->
            <div class="datos-grid">
              <div class="dato-item">
                <div class="dato-label">Codi Client</div>
                <div class="dato-valor">${c['Codi client'] || '-'}</div>
              </div>
              <div class="dato-item">
                <div class="dato-label">Correu Comercial</div>
                <div class="dato-valor">${c['Correu comercial'] || '-'}</div>
              </div>
            </div>

            <!-- ESPECIFICACIONS -->
            <div class="datos-grid full">
              <div class="dato-item">
                <div class="dato-label">Material</div>
                <div class="dato-valor">${c.Material || '-'}</div>
              </div>
            </div>

            <div class="datos-grid full">
              <div class="dato-item">
                <div class="dato-label">Mides</div>
                <div class="dato-valor">${c.Mides || '-'}</div>
              </div>
            </div>

            <!-- ALTRES DADES -->
            <div class="datos-grid">
              <div class="dato-item">
                <div class="dato-label">Qualitat</div>
                <div class="dato-valor">${c.Qualitat || '-'}</div>
              </div>
              <div class="dato-item">
                <div class="dato-label">Data Entrega</div>
                <div class="dato-valor">${c['Data entrega'] || '-'}</div>
              </div>
            </div>

            <div class="datos-grid">
              <div class="dato-item">
                <div class="dato-label">Nº Entregues</div>
                <div class="dato-valor">${c['Nº entregues'] || '-'}</div>
              </div>
              <div class="dato-item">
                <div class="dato-label">Competència</div>
                <div class="dato-valor">${c.Competència || '-'}</div>
              </div>
            </div>

            <!-- COMENTARIS COMERCIAL -->
            <div class="datos-grid full">
              <div class="dato-item">
                <div class="dato-label">Comentaris del Comercial</div>
                <div class="dato-valor">${c.Comentaris || '-'}</div>
              </div>
            </div>

            <!-- ARXIU ADJUNT -->
            ${c['Arxius adjunts'] && c['Arxius adjunts'].includes('http') ? `
              <div class="file-section">
                <strong>📎 Fitxer Adjunt Comercial:</strong>
                <br>
                <a href="${c['Arxius adjunts']}" target="_blank" class="file-link">
                  📥 Obrir Fitxer
                </a>
              </div>
            ` : ''}

            <!-- SECCIÓ RESPOSTA -->
            <div class="response-section">
              <h3>✍️ Resposta del Director</h3>
              
              <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--grey-600); text-transform: uppercase; margin-bottom: 10px;">
                Comentaris de Resposta
              </label>
              <textarea id="resposta-${c.ID}" placeholder="Escriu la teva resposta..."></textarea>

              <label style="display: block; font-size: 0.85rem; font-weight: 700; color: var(--grey-600); text-transform: uppercase; margin-bottom: 10px;">
                Adjuntar Fitxer de Resposta (opcional)
              </label>
              <div class="file-input-wrapper">
                <label for="arxiu-${c.ID}" class="file-input-label">
                  📎 Selecciona fitxer
                </label>
                <input type="file" id="arxiu-${c.ID}">
                <div class="file-name" id="fileName-${c.ID}"></div>
              </div>

              <div class="btn-group">
                <button class="btn btn-primary" onclick="enviarResposta(${c.ID})">
                  ✉️ ENVIAR RESPOSTA
                </button>
                <button class="btn btn-print" onclick="imprimirFitxa('fitxa-${c.ID}')">
                  🖨️ IMPRIMIR
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ========================================================================
    // ENVIAR RESPOSTA
    // ========================================================================
    async function enviarResposta(id) {
      const resposta = document.getElementById(`resposta-${id}`).value.trim();
      
      if (!resposta) {
        alert('⚠️ Escriu una resposta abans d\'enviar.');
        return;
      }

      const payload = {
        accio: "resposta_director",
        id: id,
        comentari: resposta
      };

      // Si hi ha fitxer, convertir a Base64
      const arxiu = arxiuSeleccionat[id];
      if (arxiu) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          payload.resposta_arxiu_base64 = e.target.result.split(',')[1];
          payload.nom_arxiu_resposta = arxiu.name;
          payload.mime_type_resposta = arxiu.type;
          enviarAlServidor(payload, id);
        };
        reader.readAsDataURL(arxiu);
      } else {
        enviarAlServidor(payload, id);
      }
    }

    async function enviarAlServidor(payload, id) {
      try {
        const btn = document.querySelector(`button[onclick="enviarResposta(${id})"]`);
        btn.disabled = true;
        btn.innerHTML = '<span>⏳</span> <span>Enviant...</span>';

        const resposta = await fetch(URL_SCRIPT, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        const resultat = await resposta.json();

        if (resultat.succes) {
          alert('✅ Resposta enviada correctament!');
          await carregarConsultes();
        } else {
          alert('⚠️ Error en l\'enviament. Prova de nou.');
        }
      } catch (e) {
        alert('⚠️ Error de connexió. Prova de nou.');
        console.error(e);
      }
    }

    // ========================================================================
    // FILTRATGE DE CONSULTES (Buscador)
    // ========================================================================
    function filtrarConsultes() {
      const terme = document.getElementById('cercador').value.toLowerCase();
      
      if (terme === '') {
        // Si no hi ha terme de búsqueda, mostrar tots ordenats per data
        mostrarConsultes(consultesGlobals);
        return;
      }
      
      const consultesFiltrandes = consultesGlobals.filter(c => {
        // Búsqueda en múltiples camps
        return (
          (c['Nom client'] || '').toLowerCase().includes(terme) ||
          (c['Nom comercial'] || '').toLowerCase().includes(terme) ||
          (c['Referència'] || '').toLowerCase().includes(terme) ||
          (c['Codi client'] || '').toString().toLowerCase().includes(terme) ||
          (c['Material'] || '').toLowerCase().includes(terme) ||
          (c['ID'] || '').toString().includes(terme)
        );
      });
      
      mostrarConsultes(consultesFiltrandes);
    }

    // ========================================================================
    // IMPRIMIR FITXA
    // ========================================================================
    function imprimirFitxa(fitxaId) {
      // Obtener el elemento de la consulta
      const fitxa = document.getElementById(fitxaId);
      
      if (!fitxa) {
        alert('Consulta no encontrada');
        return;
      }
      
      // Crear estilo para imprimir
      const style = `
        <style>
          body { font-family: Arial, sans-serif; margin: 20px; }
          .card { border: 1px solid #ddd; padding: 20px; background: white; }
          .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #006666; padding-bottom: 15px; }
          .header h1 { color: #006666; margin: 0; font-size: 24px; }
          .datos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
          .dato-item { break-inside: avoid; }
          .dato-label { font-weight: bold; color: #006666; font-size: 12px; text-transform: uppercase; }
          .dato-valor { margin-top: 5px; font-size: 14px; }
          .response-section { margin-top: 30px; padding-top: 20px; border-top: 2px solid #006666; }
          .response-section h3 { color: #006666; }
          @media print {
            body { margin: 0; }
            .card { page-break-inside: avoid; border: none; box-shadow: none; }
            .btn-group { display: none; }
            .file-input-wrapper { display: none; }
            textarea { display: none; }
            button { display: none; }
          }
        </style>
      `;
      
      // Crear ventana de impresión
      const ventanaImpresion = window.open('', '', 'width=900,height=600');
      ventanaImpresion.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">' + style + '</head><body>');
      ventanaImpresion.document.write(fitxa.outerHTML);
      ventanaImpresion.document.write('</body></html>');
      ventanaImpresion.document.close();
      
      // Esperar a que cargue y luego imprimir
      setTimeout(() => {
        ventanaImpresion.print();
      }, 500);
    }

    // ========================================================================
    // UTILITATS
    // ========================================================================
    function formatarData(data) {
      if (!data) return '-';
      const d = new Date(data);
      return d.toLocaleDateString('ca-ES');
    }
  </script>
</body>
</html>
